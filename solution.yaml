---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  labels:
    app: web-app
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0 
      maxSurge: 25%     
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      terminationGracePeriodSeconds: 45

      containers:
      - name: app
        image: your-repo/web-app:v1.0.0 
        ports:
        - containerPort: 8080
          name: http
        
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sleep", "5"]

        resources:
          requests:
            cpu: "100m"      
            memory: "128Mi"
          limits:
            cpu: "1000m"     
            memory: "128Mi"  
            
        startupProbe:
          httpGet:
            path: /healthz
            port: http
          failureThreshold: 4
          periodSeconds: 5
          
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 2
          periodSeconds: 5
          successThreshold: 1
          failureThreshold: 3
          
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          periodSeconds: 15
          failureThreshold: 3

    
      topologySpreadConstraints:
        
        - maxSkew: 1
          topologyKey: "topology.kubernetes.io/zone"
          whenUnsatisfiable: DoNotSchedule 
          labelSelector:
            matchLabels:
              app: web-app
        
        - maxSkew: 1
          topologyKey: "kubernetes.io/hostname"
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: web-app

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-app-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-app
  minReplicas: 2 
  maxReplicas: 6 
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75 
  behavior:
    
    scaleUp:
      stabilizationWindowSeconds: 0 
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300 
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60 

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: web-app-pdb
spec:
  maxUnavailable: 1 
  selector:
    matchLabels:
      app: web-app
